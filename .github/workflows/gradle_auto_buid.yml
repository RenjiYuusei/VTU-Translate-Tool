name: Auto Build APK

on:
  push:
    branches-ignore: 
      - 'gh-pages'
  pull_request: ~

jobs:
  detect-and-build:
    name: "Build on ${{ github.ref_name }}"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Auto-detect project setup
      id: detect-project
      run: |
        # Phát hiện cấu trúc dự án
        if [ -f "app/build.gradle" ]; then
          echo "ANDROID_ROOT=app" >> $GITHUB_OUTPUT
        elif [ -f "android/app/build.gradle" ]; then
          echo "ANDROID_ROOT=android/app" >> $GITHUB_OUTPUT
        else
          echo "::error::No Android project detected!"
          exit 1
        fi

        # Phát hiện build type từ commit message
        if [[ "$(git log -1 --pretty=%B)" == *"[release]"* ]]; then
          echo "BUILD_TYPE=release" >> $GITHUB_OUTPUT
        else
          echo "BUILD_TYPE=debug" >> $GITHUB_OUTPUT
        fi

    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: 17
        distribution: 'temurin'
        cache: 'gradle'

    # TỰ ĐỘNG CÀI GRADLE MỚI NHẤT
    - name: Install Latest Gradle
      id: install-gradle
      run: |
        # Lấy phiên bản Gradle mới nhất từ metadata chính thức
        LATEST_GRADLE=$(curl -s https://services.gradle.org/versions/current | jq -r '.version')
        echo "Latest Gradle version: $LATEST_GRADLE"
        
        # Tải và cài đặt Gradle
        wget https://services.gradle.org/distributions/gradle-$LATEST_GRADLE-bin.zip
        sudo unzip -d /opt/gradle gradle-$LATEST_GRADLE-bin.zip
        echo "GRADLE_HOME=/opt/gradle/gradle-$LATEST_GRADLE" >> $GITHUB_ENV
        echo "/opt/gradle/gradle-$LATEST_GRADLE/bin" >> $GITHUB_PATH
        
        # Xuất phiên bản để sử dụng sau này
        echo "GRADLE_VERSION=$LATEST_GRADLE" >> $GITHUB_ENV
        echo "GRADLE_VERSION=$LATEST_GRADLE" >> $GITHUB_OUTPUT

    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-17-${{ steps.install-gradle.outputs.GRADLE_VERSION }}-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-17-${{ steps.install-gradle.outputs.GRADLE_VERSION }}-
          ${{ runner.os }}-gradle-17-
          ${{ runner.os }}-gradle-

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept SDK licenses
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "platform-tools" "platforms;android-34"

    # SỬ DỤNG GRADLE TỪ PATH MỚI
    - name: Build APK
      run: |
        echo "Using Gradle $GRADLE_VERSION"
        gradle assemble${{ steps.detect-project.outputs.BUILD_TYPE }} --stacktrace --info

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ steps.detect-project.outputs.BUILD_TYPE }}
        path: "${{ steps.detect-project.outputs.ANDROID_ROOT }}/build/outputs/apk/${{ steps.detect-project.outputs.BUILD_TYPE }}/*.apk"
        retention-days: 7

  final-result:
    name: Build Summary
    needs: detect-and-build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check build status
      id: check-success
      run: |
        if [[ '${{ needs.detect-and-build.result }}' == 'success' ]]; then
          echo "final-success=true" >> $GITHUB_OUTPUT
          echo "build-type=${{ needs.detect-and-build.outputs.BUILD_TYPE }}" >> $GITHUB_OUTPUT
        else
          echo "final-success=false" >> $GITHUB_OUTPUT
          echo "::error::Build failed!"
          exit 1
        fi

    - name: Download artifact
      if: steps.check-success.outputs.final-success == 'true'
      uses: actions/download-artifact@v4
      with:
        name: app-${{ steps.check-success.outputs.build-type }}
        path: downloaded-artifact

    - name: Prepare final APK
      if: steps.check-success.outputs.final-success == 'true'
      run: |
        mv downloaded-artifact/*.apk final-app.apk

    - name: Upload final APK
      if: steps.check-success.outputs.final-success == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: final-app
        path: final-app.apk
        retention-days: 14

    - name: Build Success Notification
      if: steps.check-success.outputs.final-success == 'true'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `✅ Build succeeded using Gradle ${{ env.GRADLE_VERSION }}! 
            Download: [final-app.apk](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)`
          })

    - name: Build Failure Notification
      if: steps.check-success.outputs.final-success == 'false'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `❌ Build failed using Gradle ${{ env.GRADLE_VERSION }}! 
            Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
          })
          
